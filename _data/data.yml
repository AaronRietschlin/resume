career-profile:
  title: Career Profile
  summary: |
    Engineering leader with 14+ years of Android experience, including 8 years at Disney. Grew from early Disney+ engineer to Director of Android, leading a 40-person team delivering a single codebase across phones, tablets, TVs, automotive, and emerging platforms. Hands-on leader focused on architecture, reliability, and team velocity.

